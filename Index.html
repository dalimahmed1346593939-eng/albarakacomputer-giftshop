<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Baraka Gift Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
    body {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 20px;
      text-align:center;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    .container {
      display:flex;
      flex-direction:column;
      gap:15px;
      width:90%;
      max-width:400px;
      align-items:center;
    }

    .card {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius:20px;
      width:100%;
      display:flex;
      align-items:center;
      gap:15px;
      padding:15px 20px;
      color:#fff;
      text-decoration:none;
      font-size:1.2rem;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
      transform: translateY(50px);
      opacity:0;
      animation: slideUp 0.6s forwards;
    }

    .card i {
      font-size:2rem;
      min-width:40px;
      text-align:center;
    }

    .card:hover {
      transform: translateY(0) scale(1.05);
      background: rgba(255,255,255,0.35);
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
    }

    @keyframes slideUp {
      to {
        transform: translateY(0);
        opacity:1;
      }
    }

    /* stagger animation */
    .card:nth-child(1){animation-delay:0.2s;}
    .card:nth-child(2){animation-delay:0.4s;}
    .card:nth-child(3){animation-delay:0.6s;}
    .card:nth-child(4){animation-delay:0.8s;}
    .card:nth-child(5){animation-delay:1s;}
    .card:nth-child(6){animation-delay:1.2s;}
    .card:nth-child(7){animation-delay:1.4s;}

    @media(max-width:500px){
      .card { font-size:1rem; padding:12px 15px; }
      .card i { font-size:1.5rem; min-width:35px; }
    }

  </style>
</head>
<body>

  <h1>Welcome to Al Baraka Gift Shop</h1>

  <div class="container">
    <a class="card" href="https://wa.me/8801602539266?text=Hi%20Al%20Baraka%20Gift%20Shop!" target="_blank">
      <i class="fab fa-whatsapp"></i>
      WhatsApp
    </a>

    <a class="card" href="mailto:albarakacomputerandgiftcorner@gmail.com" target="_blank">
      <i class="fas fa-envelope"></i>
      Email
    </a>

    <a class="card" href="https://www.bkash.com/personal/send-money" target="_blank">
      <i class="fas fa-money-bill-wave"></i>
      Bkash
    </a>

    <a class="card" href="https://www.facebook.com/yourprofile" target="_blank">
      <i class="fab fa-facebook"></i>
      Facebook
    </a>

    <a class="card" href="https://www.facebook.com/yourpage" target="_blank">
      <i class="fab fa-facebook-square"></i>
      FB Page
    </a>

    <a class="card" href="https://www.instagram.com/yourprofile" target="_blank">
      <i class="fab fa-instagram"></i>
      Instagram
    </a>

    <a class="card" href="https://imo.im/" target="_blank">
      <i class="fas fa-comment-dots"></i>
      IMO
    </a>
  </div>

</body>
</html>
